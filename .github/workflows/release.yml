name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: |
          dotnet publish src/qiwo-rime-sync/qiwo-rime-sync.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o publish/${{ matrix.runtime }}

      - name: Pack artifact
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.runtime }}" == win-* ]]; then
            (cd publish/${{ matrix.runtime }} && zip -r ../../artifacts/qiwo-rime-sync-${{ matrix.runtime }}.zip .)
          else
            tar -czf artifacts/qiwo-rime-sync-${{ matrix.runtime }}.tar.gz -C publish/${{ matrix.runtime }} .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiwo-rime-sync-${{ matrix.runtime }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

  create-release:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
